<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starting Five — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#f0f0f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#12121a;border:1px solid #2a2a3a;border-radius:16px;padding:50px 40px;max-width:400px;width:90%;text-align:center;}
h1{font-size:1.6rem;font-weight:700;color:#1a6fd4;margin-bottom:8px;}
p{color:#8888aa;font-size:.9rem;margin-bottom:28px;line-height:1.6;}
input{width:100%;padding:12px 14px;background:#1a1a26;border:1px solid #2a2a3a;color:#f0f0f5;border-radius:8px;font-size:.95rem;margin-bottom:12px;outline:none;}
input:focus{border-color:#1a6fd4;}
button{width:100%;padding:13px;background:#1a6fd4;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;}
button:hover{background:#2d85f0;}
button:disabled{background:#333;cursor:not-allowed;}
.msg{margin-top:16px;padding:12px;border-radius:8px;font-size:.85rem;line-height:1.6;display:none;}
.msg.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#2ecc71;}
.msg.err{background:rgba(232,57,74,.1);border:1px solid rgba(232,57,74,.3);color:#e8394a;}
.status{margin-top:20px;font-size:.85rem;color:#8888aa;}
</style>
</head>
<body>
<div class="box">
  <h1>Starting Five Collectibles</h1>
  <p id="main-msg">Enter your email to receive a sign-in link.</p>

  <div id="login-form">
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    <button id="btn" onclick="sendLink()">Send Magic Link</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="checking" style="display:none">
    <div class="status" id="status-msg">Checking your login link…</div>
  </div>
</div>

<script>
const SB_URL='https://pxkbjbvcikjukwpbehdv.supabase.co';
const SB_KEY='sb_publishable_7rOxD23Xnmzk1exmdBIA-w_ZCFmlkGp';
const sb=supabase.createClient(SB_URL,SB_KEY);

const APP_URL='https://startingfivecollectibles.vercel.app';

async function init(){
  // Check for token in URL hash or query string
  const hash=window.location.hash;
  const search=window.location.search;
  
  if(hash.includes('access_token')||search.includes('access_token')){
    document.getElementById('login-form').style.display='none';
    document.getElementById('checking').style.display='block';
    document.getElementById('status-msg').textContent='Signing you in…';

    try{
      // Try hash first
      if(hash.includes('access_token')){
        const params=new URLSearchParams(hash.replace('#',''));
        const{error}=await sb.auth.setSession({
          access_token:params.get('access_token'),
          refresh_token:params.get('refresh_token')
        });
        if(error)throw error;
      } else {
        // Try getSession which picks up query params
        const{data,error}=await sb.auth.getSession();
        if(error)throw error;
        if(!data.session)throw new Error('No session found');
      }
      document.getElementById('status-msg').textContent='✅ Signed in! Redirecting…';
      setTimeout(()=>window.location.href=APP_URL,1000);
    } catch(e){
      document.getElementById('login-form').style.display='block';
      document.getElementById('checking').style.display='none';
      showMsg('Link expired or invalid. Request a new one below.','err');
    }
    return;
  }

  // Check existing session
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){
    document.getElementById('login-form').style.display='none';
    document.getElementById('checking').style.display='block';
    document.getElementById('status-msg').textContent='Already signed in. Redirecting…';
    setTimeout(()=>window.location.href=APP_URL,800);
  }
}

async function sendLink(){
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('btn');
  if(!email){showMsg('Enter your email.','err');return;}
  btn.disabled=true;btn.textContent='Sending…';
  const{error}=await sb.auth.signInWithOtp({
    email,
    options:{emailRedirectTo:'https://startingfivecollectibles.vercel.app/auth.html'}
  });
  btn.disabled=false;btn.textContent='Send Magic Link';
  if(error){showMsg('Error: '+error.message,'err');}
  else{showMsg('✅ Check your email and click the link. Then come back here automatically.','ok');}
}

function showMsg(txt,type){
  const m=document.getElementById('msg');
  m.textContent=txt;m.className='msg '+type;m.style.display='block';
}

init();
</script>
</body>
</html>
